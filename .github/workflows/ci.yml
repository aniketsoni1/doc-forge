name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Typecheck · Lint · Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run typecheck:ext
      - run: npm run lint
      - run: npm test

  e2e:
    name: End-to-end (CLI + smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run smoke
      - name: CLI creates Markdown (offline template)
        run: node dist/cli/index.cjs create "README for a tool called Acme" --no-ai --output /tmp/out --non-interactive --force
      - name: CLI creates sanitized HTML (offline template)
        run: node dist/cli/index.cjs create "Report on sales" --format html --no-ai --output /tmp/out --non-interactive --force
      - name: Assert output exists
        run: test -f /tmp/out.md && test -f /tmp/out.html && ! grep -q "<script" /tmp/out.html
