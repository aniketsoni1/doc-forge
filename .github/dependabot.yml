version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      dev-tooling:
        patterns: ["eslint*", "@eslint/*", "typescript-eslint", "esbuild", "tsx"]
    ignore:
      # Dev-tool majors have broken CI before - bump these deliberately, not automatically.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      # @types/node must track the minimum supported Node (20), not the newest
      # major - a 26.x bump pulls in web-streams globals that break node:readline typing.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # @types/vscode must match engines.vscode (^1.90), not the latest.
      - dependency-name: "@types/vscode"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
