version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      dev-tooling:
        patterns: ["eslint*", "@eslint/*", "typescript-eslint", "esbuild", "tsx"]
    ignore:
      # Dev-tool majors have broken CI before — bump these deliberately, not automatically.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
